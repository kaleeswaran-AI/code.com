<!DOCTYPE html>
<html>
<head>
    <title>🤖Code.com Login</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:'Poppins',sans-serif;
    }

    body{
        min-height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:#0F172A;
        color:#F8FAFC;
    }

    .container{
        width:420px;
        background:#1E293B;
        padding:40px;
        border-radius:20px;
        border:1px solid rgba(56,189,248,.3);
        box-shadow:0 0 30px rgba(56,189,248,.2);
    }

    .logo{
        text-align:center;
        margin-bottom:10px;
    }

    .logo h1{
        color:#38BDF8;
        font-size:42px;
        text-shadow:0 0 10px #38BDF8;
    }

    .tagline{
        text-align:center;
        color:#94A3B8;
        margin-bottom:30px;
        font-size:14px;
    }

    h3{
        text-align:center;
        color:#38BDF8;
        margin-bottom:20px;
    }

    input{
        width:100%;
        padding:12px;
        margin-bottom:15px;
        border:none;
        outline:none;
        border-radius:10px;
        background:#0F172A;
        color:white;
        border:1px solid #334155;
        font-size:15px;
    }

    input:focus{
        border-color:#38BDF8;
        box-shadow:0 0 10px rgba(56,189,248,.4);
    }

    button{
        width:100%;
        padding:12px;
        border:none;
        border-radius:10px;
        background:#38BDF8;
        color:white;
        font-size:15px;
        font-weight:600;
        cursor:pointer;
        transition:.3s;
    }

    button:hover{
        background:#0EA5E9;
        box-shadow:0 0 15px #38BDF8;
    }

    hr{
        border:none;
        border-top:1px solid #334155;
        margin:25px 0;
    }

    .signup{
        text-align:center;
        color:#94A3B8;
    }

    .signup a{
        color:#38BDF8;
        text-decoration:none;
        font-weight:600;
    }

    .footer{
        text-align:center;
        margin-top:20px;
        color:#94A3B8;
        font-size:12px;
    }
    #loader{
    display:none;
    margin-left:8px;
    animation:spin 1s linear infinite;
    }

    @keyframes spin{
    from{
        transform:rotate(0deg);
    }
    to{
        transform:rotate(360deg);
    }
}
/* AI Animated Background */

.ai-bg{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    overflow:hidden;
    z-index:-1;
}

.ai-bg span{
    position:absolute;
    display:block;
    width:8px;
    height:8px;
    background:#38BDF8;
    border-radius:50%;
    box-shadow:0 0 20px #38BDF8;
    animation:float 18s linear infinite;
    opacity:.35;
}

.ai-bg span:nth-child(1){left:5%; animation-duration:18s;}
.ai-bg span:nth-child(2){left:20%; animation-duration:24s;}
.ai-bg span:nth-child(3){left:35%; animation-duration:16s;}
.ai-bg span:nth-child(4){left:50%; animation-duration:22s;}
.ai-bg span:nth-child(5){left:65%; animation-duration:19s;}
.ai-bg span:nth-child(6){left:80%; animation-duration:25s;}
.ai-bg span:nth-child(7){left:90%; animation-duration:20s;}
.ai-bg span:nth-child(8){left:98%; animation-duration:17s;}

@keyframes float{

    0%{
        transform:translateY(100vh) scale(.5);
        opacity:0;
    }

    20%{
        opacity:.4;
    }

    80%{
        opacity:.4;
    }

    100%{
        transform:translateY(-120px) scale(1.3);
        opacity:0;
    }

}
#aiCanvas{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:-1;
    background:#0F172A;
}
.grid{

    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;

    background-image:

        linear-gradient(rgba(56,189,248,.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(56,189,248,.05) 1px, transparent 1px);

    background-size:50px 50px;

    animation:gridMove 20s linear infinite;

    z-index:-2;

}

@keyframes gridMove{

    from{
        transform:translateY(0px);
    }

    to{
        transform:translateY(50px);
    }

}
body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
        radial-gradient(circle at center,
        #1E3A8A 0%,
        #0F172A 60%,
        #020617 100%);
    color:#F8FAFC;
    overflow:hidden;
}

    </style>

</head>
<script>

document.querySelector("form").addEventListener("submit", function(){

    document.getElementById("btnText").innerHTML="Logging in...";

    document.getElementById("loader").style.display="inline-block";

    document.getElementById("loginBtn").disabled=true;

});

</script>

<body>
    <div class="grid"></div>

<canvas id="aiCanvas"></canvas>

<div class="ai-bg">

    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>

</div>

<div class="container">

    <div class="logo">
        <h1>🤖Code.com</h1>
    </div>

    <div class="tagline">
        The Future of Coding Starts Here
    </div>

    <h3>Login</h3>

    <form action="/login" method="post">

        <input
    type="text"
    name="login"
    placeholder="Username or Email"
    required
>

        <input
            type="password"
            name="password"
            placeholder="Password"
            required
        >

       <button type="submit" id="loginBtn">
        <span id="btnText">Login</span>
        <span id="loader" style="display:none;">⏳</span>
        </button>

    </form>

    <hr>

    <div class="signup">
        New to Code.com?<br><br>

        <a href="/signup">
            Create an Account
        </a>
    </div>

    <div class="footer">
        © 2026 Code.com • Learn • Build • Innovate
    </div>

</div>
<script>

const canvas = document.getElementById("aiCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

const particles = [];

for(let i=0;i<120;i++){

    particles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        dx:(Math.random()-0.5),
        dy:(Math.random()-0.5),
        r:2+Math.random()*2
    });

}
const mouse = {
    x: null,
    y: null
};

canvas.addEventListener("mousemove", function(e){

    mouse.x = e.clientX;
    mouse.y = e.clientY;

});

canvas.addEventListener("mouseleave", function(){

    mouse.x = null;
    mouse.y = null;

});

function animate(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    for(let p of particles){

        p.x+=p.dx;
        p.y+=p.dy;

        if(p.x<0 || p.x>canvas.width) p.dx*=-1;
        if(p.y<0 || p.y>canvas.height) p.dy*=-1;

       // Animated glowing node

let glow = 15 + Math.sin(Date.now() * 0.003 + p.x) * 10;

ctx.beginPath();
ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);

ctx.fillStyle = "#38BDF8";

ctx.shadowBlur = glow;
ctx.shadowColor = "#38BDF8";

ctx.fill();
        if(mouse.x != null){

    let dx = mouse.x - p.x;
    let dy = mouse.y - p.y;

    let distance = Math.sqrt(dx*dx + dy*dy);

    if(distance < 150){

        ctx.beginPath();

        ctx.moveTo(p.x,p.y);

        ctx.lineTo(mouse.x,mouse.y);

        ctx.strokeStyle = "rgba(56,189,248,"+(1-distance/150)*0.8+")";

        ctx.lineWidth = 1.5;


        ctx.stroke();

    }

}

    }
    // Connect nearby particles

for(let i=0;i<particles.length;i++){

    for(let j=i+1;j<particles.length;j++){

        let dx = particles[i].x - particles[j].x;
        let dy = particles[i].y - particles[j].y;

        let distance = Math.sqrt(dx*dx + dy*dy);

        if(distance < 120){

            ctx.beginPath();

            ctx.moveTo(particles[i].x, particles[i].y);

            ctx.lineTo(particles[j].x, particles[j].y);

            ctx.strokeStyle = "rgba(56,189,248," + (1-distance/120)*0.4 + ")";

            ctx.lineWidth = 1.5;
ctx.shadowBlur = 8;
ctx.shadowColor = "#38BDF8";

            ctx.stroke();

        }

    }

}

    requestAnimationFrame(animate);

}

animate();

</script>
</body>
</html>
