
<!DOCTYPE html>
<html>
<head>
    <title>Code.com Login</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#0F172A;
            color:#F8FAFC;
        }

        .container{
            width:420px;
            background:#1E293B;
            padding:40px;
            border-radius:20px;
            border:1px solid rgba(56,189,248,0.3);
            box-shadow:0 0 30px rgba(56,189,248,0.2);
        }

        .logo{
            text-align:center;
            margin-bottom:10px;
        }

        .logo h1{
            color:#38BDF8;
            font-size:42px;
            text-shadow:0 0 10px #38BDF8;
        }

        .tagline{
            text-align:center;
            color:#94A3B8;
            margin-bottom:30px;
            font-size:14px;
        }

        h3{
            color:#38BDF8;
            margin-bottom:15px;
            text-align:center;
        }

        input{
            width:100%;
            padding:12px;
            margin-bottom:15px;
            border:none;
            outline:none;
            border-radius:10px;
            background:#0F172A;
            color:white;
            border:1px solid #334155;
            font-size:15px;
        }

        input:focus{
            border-color:#38BDF8;
            box-shadow:0 0 10px rgba(56,189,248,0.4);
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:10px;
            cursor:pointer;
            font-size:15px;
            font-weight:600;
            transition:0.3s;
            margin-bottom:10px;
        }

        .login-btn{
            background:#38BDF8;
            color:white;
        }

        .login-btn:hover{
            background:#0EA5E9;
            box-shadow:0 0 15px #38BDF8;
        }

        .register-btn{
            background:#22C55E;
            color:white;
        }

        .register-btn:hover{
            box-shadow:0 0 15px #22C55E;
        }

        hr{
            border:none;
            border-top:1px solid #334155;
            margin:25px 0;
        }

        .footer{
            text-align:center;
            margin-top:15px;
            color:#94A3B8;
            font-size:12px;
        }
        .watermark{
    position: fixed;
    bottom: 15px;
    right: 20px;
    color: rgba(56,189,248,0.5);
    font-size: 13px;
    font-weight: bold;
    font-family: 'Poppins', sans-serif;
    text-shadow: 0 0 8px rgba(56,189,248,0.3);
    user-select: none;
    pointer-events: none;
    z-index: 9999;
}

    </style>
</head>

<body>

<div class="container">

    <div class="logo">
        <h1>Code.com</h1>
    </div>

    <div class="tagline">
        The Future of Coding Starts Here
    </div>

    <h3>Login</h3>

    <form action="/login" method="post">

        <input
            type="text"
            name="username"
            placeholder="Username"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Password"
            required
        >

        <button
            type="submit"
            class="login-btn"
        >
            Login
        </button>

    </form>

    <hr>

    <h3>Create Account</h3>

    <form action="/register" method="post">

        <input
            type="text"
            name="username"
            placeholder="New Username"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="New Password"
            required
        >

        <button
            type="submit"
            class="register-btn"
        >
            Register
        </button>

    </form>

    <div class="footer">
        © 2026 Code.com • Learn • Build • Innovate
    </div>





<div class="watermark">
    © 2026 Code.com | Developed by Kaleeswaran P
</div>

</body>
</html>

</body>
</html>
